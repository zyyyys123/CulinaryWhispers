spring:
  application:
    name: CulinaryWhispers
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/culinary_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 3000
    elasticsearch:
      repositories:
        enabled: false

server:
  port: 8080

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    com.zyyyys.culinarywhispers: debug

jwt:
  secret: mySecretKeyForCulinaryWhispersProject2026
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

culinary:
  ai:
    enabled: ${CULINARY_AI_ENABLED:false}
    provider: ${CULINARY_AI_PROVIDER:openai}
    api-key: ${CULINARY_AI_API_KEY:}
    base-url: ${CULINARY_AI_BASE_URL:https://api.openai.com/v1/chat/completions}
    model: ${CULINARY_AI_MODEL:gpt-4o-mini}
    temperature: ${CULINARY_AI_TEMPERATURE:0.3}
    knowledge-path: ${CULINARY_AI_KNOWLEDGE_PATH:docs2.0/knowledge}
