spring:
  application:
    name: CulinaryWhispers
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${CW_DB_URL:jdbc:mysql://localhost:3306/culinary_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${CW_DB_USERNAME:root}
    password: ${CW_DB_PASSWORD:}
  data:
    redis:
      host: ${CW_REDIS_HOST:localhost}
      port: ${CW_REDIS_PORT:6379}
      password: ${CW_REDIS_PASSWORD:}
      database: ${CW_REDIS_DATABASE:0}
      timeout: ${CW_REDIS_TIMEOUT_MS:3000}
    elasticsearch:
      repositories:
        enabled: false

server:
  port: ${CW_SERVER_PORT:8080}

mybatis-plus:
  configuration:
    log-impl: ${CW_MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    com.zyyyys.culinarywhispers: ${CW_LOG_LEVEL:debug}
  file:
    path: ${CW_LOG_DIR:logs}

jwt:
  secret: ${CW_JWT_SECRET:}
  expiration: ${CW_JWT_EXPIRATION_MS:86400000}

cw:
  token:
    store: ${CW_TOKEN_STORE:redis}
  search:
    type: ${CW_SEARCH_TYPE:db}
  upload:
    dir: ${CW_UPLOAD_DIR:uploads}
    max-size-mb: ${CW_UPLOAD_MAX_SIZE_MB:3}
    cache-seconds: ${CW_UPLOAD_CACHE_SECONDS:3600}
    allowed-content-types: ${CW_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}
    public-url-prefix: ${CW_UPLOAD_PUBLIC_URL_PREFIX:/api/uploads/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

culinary:
  ai:
    enabled: ${CULINARY_AI_ENABLED:false}
    provider: ${CULINARY_AI_PROVIDER:openai}
    api-key: ${CULINARY_AI_API_KEY:}
    base-url: ${CULINARY_AI_BASE_URL:https://api.openai.com/v1/chat/completions}
    model: ${CULINARY_AI_MODEL:gpt-4o-mini}
    temperature: ${CULINARY_AI_TEMPERATURE:0.3}
    knowledge-path: ${CULINARY_AI_KNOWLEDGE_PATH:src/main/java/com/zyyyys/culinarywhispers/module/ai/knowledge}
    max-context-chars: ${CULINARY_AI_MAX_CONTEXT_CHARS:3500}
    max-chunks: ${CULINARY_AI_MAX_CHUNKS:4}
