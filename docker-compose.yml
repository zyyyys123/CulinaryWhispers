version: '3.8'

services:
  app:
    build: .
    container_name: culinary-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/culinary_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - culinary-net

  mysql:
    image: mysql:8.0
    container_name: culinary-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./sql/mysql.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - culinary-net

  redis:
    image: redis:7
    container_name: culinary-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - culinary-net

  # Elasticsearch 8.x
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: culinary-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - culinary-net

  # Kibana
  kibana:
    image: kibana:8.11.1
    container_name: culinary-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - culinary-net

  # Milvus Standalone
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    profiles: ["full"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - culinary-net

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    profiles: ["full"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - culinary-net

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    profiles: ["full"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"
    networks:
      - culinary-net

  # Attu (Milvus GUI)
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.3.1
    profiles: ["full"]
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus
    networks:
      - culinary-net

  doris-fe:
    image: apache/doris:2.0.3-fe-x86_64
    container_name: culinary-doris-fe
    profiles: ["full"]
    hostname: doris-fe
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - FE_ID=1
    ports:
      - "8030:8030" # UI
      - "9030:9030" # MySQL Query
    volumes:
      - doris-fe-data:/opt/apache-doris/fe/doris-meta
    networks:
      culinary-net:
        ipv4_address: 172.20.80.2

  doris-be:
    image: apache/doris:2.0.3-be-x86_64
    container_name: culinary-doris-be
    profiles: ["full"]
    hostname: doris-be
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.3:9050
    ports:
      - "8040:8040" # BE Web
    volumes:
      - doris-be-data:/opt/apache-doris/be/storage
    depends_on:
      - doris-fe
    privileged: true # Often required for sysctl
    networks:
      culinary-net:
        ipv4_address: 172.20.80.3

  doris-init:
    image: mysql:8.0
    container_name: culinary-doris-init
    profiles: ["full"]
    volumes:
      - ./scripts/ops/init_doris.sh:/init_doris.sh
      - ./sql/doris.sql:/sql/doris.sql
    entrypoint: ["/bin/bash", "/init_doris.sh"]
    depends_on:
      - doris-fe
      - doris-be
    networks:
      - culinary-net

  go-gateway:
    build:
      context: ./go-edge
      dockerfile: gateway/Dockerfile
    container_name: culinary-go-gateway
    ports:
      - "8081:8081"
    environment:
      - GIN_MODE=release
      - CW_GATEWAY_PORT=:8081
      - CW_GATEWAY_TARGET_URL=http://app:8080
      - CW_JWT_SECRET=mySecretKeyForCulinaryWhispersProject2026
    depends_on:
      - app
    networks:
      - culinary-net

  go-im:
    build:
      context: ./go-edge
      dockerfile: im/Dockerfile
    container_name: culinary-go-im
    ports:
      - "8082:8082"
    environment:
      - GIN_MODE=release
    depends_on:
      - redis
    networks:
      - culinary-net

  prometheus:
    image: prom/prometheus:latest
    container_name: culinary-prometheus
    profiles: ["full"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - culinary-net

  grafana:
    image: grafana/grafana:latest
    container_name: culinary-grafana
    profiles: ["full"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - culinary-net

  skywalking-oap:
    image: apache/skywalking-oap-server:9.4.0
    container_name: culinary-skywalking-oap
    profiles: ["full"]
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - culinary-net

  skywalking-ui:
    image: apache/skywalking-ui:9.4.0
    container_name: culinary-skywalking-ui
    profiles: ["full"]
    ports:
      - "8088:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    depends_on:
      - skywalking-oap
    networks:
      - culinary-net

networks:
  culinary-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
  redis-data:
  es-data:
  etcd-data:
  minio-data:
  milvus-data:
  doris-fe-data:
  doris-be-data:
