name: Bug Report
description: 报告缺陷（含验收标准）
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        请填写以下信息，尽量提供可复现步骤、预期/实际行为与验收标准。
  - type: textarea
    id: background
    attributes:
      label: 背景/上下文
      description: 业务背景、发生场景、影响范围
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 现象、报错、截图/日志（脱敏）
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 1/2/3 步骤，必要时附账号/数据准备（不要写密码/Token）
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 可量化/可检查（建议勾选清单）
      value: |
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 相关链接、参考、临时规避方案等

